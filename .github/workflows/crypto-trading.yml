name: Crypto Trading Signal System

on:
  schedule:
    # VNT (UTC+7): 05:00 = 22:00 UTC (previous day)
    - cron: '0 22 * * *'
    # VNT (UTC+7): 10:00 = 03:00 UTC
    - cron: '0 3 * * *'
    # VNT (UTC+7): 15:00 = 08:00 UTC
    - cron: '0 8 * * *'
    # VNT (UTC+7): 21:00 = 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch: {}

jobs:
  crypto-trading:
    name: Generate crypto trading signals
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run crypto trading signal system
        working-directory: scripts
        env:
          DISCORD_TRADING_WEBHOOK_URL: ${{ secrets.DISCORD_TRADING_WEBHOOK_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python crypto_trading.py
